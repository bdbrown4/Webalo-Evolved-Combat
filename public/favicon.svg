<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A Wobble grunt">
  <!-- Webalo: Evolved Combat — a Wobble Coalition grunt (the orange "blork":
       round body, oversized googly eyes, jaunty antennae, stubby feet). -->
  <defs>
    <radialGradient id="wobbleBody" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffc079"/>
      <stop offset="55%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#e7641c"/>
    </radialGradient>
  </defs>

  <!-- antennae -->
  <g stroke="#d85f1c" stroke-width="3" stroke-linecap="round">
    <path d="M25 17 C 22 10, 20 8, 18 6.5" fill="none"/>
    <path d="M39 17 C 42 10, 44 8, 46 6.5" fill="none"/>
  </g>
  <circle cx="17.6" cy="6.2" r="3.1" fill="#d85f1c"/>
  <circle cx="46.4" cy="6.2" r="3.1" fill="#d85f1c"/>

  <!-- stubby feet -->
  <ellipse cx="25" cy="52.6" rx="5.2" ry="3.2" fill="#d2571a"/>
  <ellipse cx="39" cy="52.6" rx="5.2" ry="3.2" fill="#d2571a"/>

  <!-- round body -->
  <ellipse cx="32" cy="34" rx="21" ry="19.5" fill="url(#wobbleBody)" stroke="#c2540f" stroke-width="1.5"/>

  <!-- oversized googly eyes -->
  <circle cx="24" cy="31.5" r="8" fill="#fff" stroke="#dcd5c8" stroke-width="0.8"/>
  <circle cx="40" cy="31.5" r="8" fill="#fff" stroke="#dcd5c8" stroke-width="0.8"/>
  <circle cx="25.6" cy="33.2" r="3.7" fill="#171109"/>
  <circle cx="38.4" cy="33.2" r="3.7" fill="#171109"/>
  <circle cx="24.3" cy="31.7" r="1.25" fill="#fff"/>
  <circle cx="37.1" cy="31.7" r="1.25" fill="#fff"/>

  <!-- little mouth -->
  <path d="M28 44 Q 32 47.6, 36 44" fill="none" stroke="#8f3b0c" stroke-width="2" stroke-linecap="round"/>
</svg>
